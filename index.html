<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paște Fericit | Optimized</title>

<style>
:root {
  --bg:#06070b;
  --text:#f8f2e8;
  --gold:#f5d38a;
  --panel:rgba(17,22,35,0.85);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:linear-gradient(180deg,#05070d,#0b1020);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== LIGHTWEIGHT MODE ===== */
@media (max-width:560px){
  .heavy{display:none!important;}
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:24px 16px;
}
.hero h1{
  font-size:clamp(2rem,6vw,3rem);
}
.hero span{
  color:var(--gold);
}

/* ===== CARD ===== */
.card{
  margin:16px;
  border-radius:20px;
  background:var(--panel);
  padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

/* ===== MESSAGE ===== */
.message-title{
  font-size:1.6rem;
  margin-bottom:10px;
  color:var(--gold);
}
.message-body{
  line-height:1.7;
  font-size:0.95rem;
}

/* ===== BUTTONS ===== */
button{
  border:none;
  padding:12px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}
.primary{
  background:linear-gradient(90deg,var(--gold),#fff);
  color:#000;
}
.secondary{
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* ===== EGG ===== */
.egg{
  width:120px;
  height:160px;
  border-radius:50%;
  margin:20px auto;
  background:linear-gradient(#fff4d8,#d6a65f);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  cursor:pointer;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  padding:20px;
  font-size:0.8rem;
  opacity:.7;
}
</style>
</head>

<body>

<section class="hero">
  <h1>Paște <span>Fericit</span></h1>
  <p>Experiență interactivă optimizată pentru mobil</p>
</section>

<section class="card">

  <div class="message-title">Paște Fericit ✨</div>
  <div class="message-body" id="msg">
    Să ai parte de liniște, lumină și oameni dragi aproape.
  </div>

  <button class="primary" onclick="nextMsg()">Alt mesaj</button>
  <button class="secondary" onclick="copyMsg()">Copiază</button>

  <div class="egg" onclick="hitEgg()" id="egg">🐣</div>
  <div id="eggText" style="text-align:center">0 / 3</div>

</section>

<div class="footer">
  Mobile optimized • Lightweight version
</div>

<script>
const messages = [
"Paștele să-ți aducă pace și bucurie.",
"Să ai lumină în suflet și zâmbete în jur.",
"Un Paște cald și plin de speranță."
];

let index=0;

function nextMsg(){
  index=(index+1)%messages.length;
  document.getElementById("msg").innerText=messages[index];
}

function copyMsg(){
  navigator.clipboard.writeText(messages[index]);
  alert("Copiat ✨");
}

/* ===== EGG GAME ===== */
let hits=0;
function hitEgg(){
  hits++;
  document.getElementById("eggText").innerText=hits+" / 3";

  if(hits>=3){
    document.getElementById("egg").innerText="✨";
    document.getElementById("msg").innerText="Bonus: Paște Fericit cu lumină maximă!";
  }
}
</script>

</body>
</html>
